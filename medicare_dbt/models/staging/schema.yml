version: 2

models:
  - name: stg_medicare_enrollment
    description: "Cleaned and standardized Medicare enrollment data. Passes through all geographic levels and months for downstream mart filtering. Column names are renamed for readability."
    columns:
      - name: year
        description: "Enrollment year cast to integer."
        tests:
          - not_null
      - name: month
        description: "Enrollment month as a full month name, or 'Year' for annual summary rows."
        tests:
          - not_null
      - name: bene_geo_lvl
        description: "Geographic aggregation level: National, State, or County."
        tests:
          - not_null
          - accepted_values:
              values: ['National', 'State', 'County']
      - name: total_beneficiaries
        description: "Total Medicare beneficiaries."
      - name: state
        description: "Two-letter state abbreviation."
      - name: state_name
        description: "Full state name."
      - name: county
        description: "County name."
      - name: fips_code
        description: "Five-digit FIPS code."
      - name: original_medicare_benes
        description: "Beneficiaries enrolled in Original Medicare (Fee-for-Service)."
      - name: medicare_advantage_benes
        description: "Beneficiaries enrolled in Medicare Advantage and other managed care plans."
      - name: aged_beneficiaries
        description: "Beneficiaries enrolled due to age (65+)."
      - name: disabled_beneficiaries
        description: "Beneficiaries enrolled due to disability."
      - name: male_beneficiaries
        description: "Male beneficiaries."
      - name: female_beneficiaries
        description: "Female beneficiaries."