name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Lint DAGs
        run: flake8 dags/ --max-line-length=120 --ignore=E501,W503,E402

      - name: Lint source
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503

      - name: Lint dashboards
        run: flake8 dashboards/ --max-line-length=120 --ignore=E501,W503

  dbt:
    name: Validate dbt
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      POSTGRES_PORT: 5432
      REDSHIFT_ENDPOINT: dummy.redshift.amazonaws.com
      REDSHIFT_DATABASE: medicare_db
      REDSHIFT_ADMIN_USERNAME: admin

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-postgres dbt-redshift

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          medicare_dbt:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                user: airflow
                password: airflow
                dbname: airflow
                schema: dbt_medicare
                threads: 4
              prod:
                type: redshift
                method: iam
                host: dummy.redshift.amazonaws.com
                port: 5439
                dbname: medicare_db
                schema: dbt_medicare
                threads: 4
                ra3_node: true
                region: us-east-1
                user: admin
          EOF

      - name: Create source table
        run: |
          PGPASSWORD=airflow psql -h localhost -U airflow -d airflow -c "
          CREATE SCHEMA IF NOT EXISTS public;
          CREATE TABLE IF NOT EXISTS public.medicare_monthly_enrollment (
            year VARCHAR(10),
            month VARCHAR(20),
            bene_geo_lvl VARCHAR(20),
            bene_state_abrvtn VARCHAR(5),
            bene_state_desc VARCHAR(50),
            bene_county_desc VARCHAR(100),
            bene_fips_cd VARCHAR(10),
            tot_benes DOUBLE PRECISION,
            orgnl_mdcr_benes DOUBLE PRECISION,
            ma_and_oth_benes DOUBLE PRECISION,
            aged_tot_benes DOUBLE PRECISION,
            dsbld_tot_benes DOUBLE PRECISION,
            male_tot_benes DOUBLE PRECISION,
            female_tot_benes DOUBLE PRECISION
          );
          INSERT INTO public.medicare_monthly_enrollment VALUES
            ('2025', 'December', 'National', NULL, NULL, NULL, NULL, 67000000, 30000000, 37000000, 55000000, 12000000, 32000000, 35000000),
            ('2025', 'December', 'State', 'CA', 'California', NULL, '06000', 6000000, 2500000, 3500000, 5000000, 1000000, 2800000, 3200000),
            ('2025', 'Year', 'State', 'CA', 'California', NULL, '06000', 6000000, 2500000, 3500000, 5000000, 1000000, 2800000, 3200000),
            ('2025', 'December', 'County', 'CA', 'California', 'Los Angeles', '06037', NULL, NULL, NULL, NULL, NULL, NULL, NULL);
          "

      - name: dbt deps
        working-directory: medicare_dbt
        run: dbt deps --profiles-dir ~/.dbt

      - name: dbt compile (dev)
        working-directory: medicare_dbt
        run: dbt compile --profiles-dir ~/.dbt --target dev

      - name: dbt run (dev)
        working-directory: medicare_dbt
        run: dbt run --profiles-dir ~/.dbt --target dev

      - name: dbt test (dev)
        working-directory: medicare_dbt
        run: dbt test --profiles-dir ~/.dbt --target dev