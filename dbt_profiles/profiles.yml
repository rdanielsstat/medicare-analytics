medicare_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres
      port: 5432
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: dbt_medicare
      threads: 4
    prod:
      type: redshift
      method: iam
      host: "{{ env_var('REDSHIFT_ENDPOINT') }}"
      port: 5439
      dbname: "{{ env_var('REDSHIFT_DATABASE') }}"
      schema: dbt_medicare
      threads: 4
      ra3_node: true
      region: us-east-1
      user: "{{ env_var('REDSHIFT_ADMIN_USERNAME') }}"